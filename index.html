<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Framework</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html, body{
            width:100%;
            height:100%;
            overflow:hidden;
            font-family:Arial, Helvetica, sans-serif;
        }

        .container{
            display:grid;
            grid-template-columns:220px 1fr;
            height:100vh;
            width:100vw;
        }

        .menu{
            border-right:1px solid #CCCCCC;
            height:100%;
        }

        .content{
            display:grid;
            grid-template-rows:70px 1fr 40px;
            height:100%;
        }

        iframe{
            width:100%;
            height:100%;
            border:none;
            display:block;
        }

        .header{
            border-bottom:1px solid #CCCCCC;
        }

        .body{
            overflow:hidden;
        }

        .footer{
            border-top:1px solid #CCCCCC;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Left Menu -->
    <div class="menu">
        <iframe src="Menu.html" title="Menu"></iframe>
    </div>

    <!-- Right Side -->
    <div class="content">

        <!-- Header -->
        <div class="header">
            <iframe src="Header.html" title="Header"></iframe>
        </div>

        <!-- Body -->
        <div class="body">
            <iframe src="ITE.html" title="Body" name="content-viewport"></iframe>
        </div>

        <!-- Footer -->
        <div class="footer">
            <iframe src="Footer.html" title="Footer"></iframe>
        </div>

    </div>

</div>

</body>
</html>
